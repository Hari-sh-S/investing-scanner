name: Keep Streamlit App Alive

on:
  schedule:
    # Every 30 minutes - stays well within GitHub's 2000 free minutes/month
    - cron: '*/30 * * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Also triggers on push - prevents GitHub auto-disabling after 60 days of no pushes
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging app at $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://vesting-scanner.streamlit.app/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ App is alive"
          else
            echo "⚠️ App returned status $STATUS"
          fi
