name: Keep Streamlit App Alive

on:
  schedule:
    # Every 30 minutes to prevent the app from sleeping
    - cron: '*/30 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Ping App with Headless Browser
        run: |
          python -c "
          from selenium import webdriver
          from selenium.webdriver.chrome.options import Options
          from selenium.webdriver.chrome.service import Service
          from webdriver_manager.chrome import ChromeDriverManager
          import time

          print('Configuring headless Chrome...')
          options = Options()
          options.add_argument('--headless')
          options.add_argument('--no-sandbox')
          options.add_argument('--disable-dev-shm-usage')
          options.add_argument('--window-size=1920,1080')
          
          # Initialize driver
          driver = webdriver.Chrome(service=Service(ChromeDriverManager().install()), options=options)
          
          try:
              print('Navigating to app...')
              driver.get('https://investing-scanner.streamlit.app/')
              
              # Wait 15 seconds to ensure JavaScript executes and WebSocket connects
              print('Waiting for Streamlit WebSocket to connect...')
              time.sleep(15)
              
              print('Successfully loaded app. Page title:', driver.title)
          except Exception as e:
              print('Error occurred:', e)
          finally:
              driver.quit()
              print('Browser closed.')
          "
