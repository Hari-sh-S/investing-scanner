name: Keep Streamlit App Alive

on:
  schedule:
    # Every 30 minutes - stays well within GitHub's 2000 free minutes/month
    - cron: '*/30 * * * *'
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
  # Also triggers on push - prevents GitHub auto-disabling after 60 days of no pushes
  push:
    branches:
      - main

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit App
        run: |
          echo "Pinging https://investing-scanner.streamlit.app/ at $(date)"
          curl -s -L --max-time 30 \
               -o /dev/null \
               -w "HTTP Status: %{http_code}\n" \
               https://investing-scanner.streamlit.app/ || true
          echo "✅ Ping complete"
